<!--
  FANOMETRIX PULSE — MPU Embed Code (300x250)
  ============================================
  Copy the <iframe> tag below and paste it into your ad server,
  CMS, or partner page. Replace the parameter values with your own.

  URL PARAMETERS
  ──────────────
  campaign   Your campaign identifier        e.g. premier-league-2026
  publisher  The media owner / site name     e.g. sky-sports
  placement  Where on the page it appears    e.g. homepage-mpu
  country    2-letter ISO country code       e.g. GB  (ad server usually knows this)
  segment    Fan segment label               e.g. season-ticket-holder

  All parameters are optional but strongly recommended for dashboard filtering.

  AD SERVER MACROS
  ────────────────
  Replace values with your ad server's macros, for example:
  - Google Ad Manager : %%SITE%% %%PLACEMENT%%
  - Xandr             : ${SITE_NAME} ${PLACEMENT_ID}
  - Freewheel         : [siteid] [subsection]
-->

<!-- Basic embed -->
<iframe
  src="https://fanometrix-surveys.vercel.app/embed?campaign=premier-league-2026&publisher=sky-sports&placement=homepage-mpu&country=GB&segment=season-ticket-holder"
  width="300"
  height="250"
  frameborder="0"
  scrolling="no"
  style="border:0; overflow:hidden; display:block;"
  title="Fanometrix Pulse Fan Survey"
  loading="lazy"
></iframe>

    height="250"
    frameborder="0"
