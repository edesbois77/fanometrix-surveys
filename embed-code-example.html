<!--
  FANOMETRIX PULSE — MPU Embed Code (300x250)
  ============================================
  Send this file to your ad operations / media partner.
  They paste the relevant tag into their ad server and traffic it as a
  third-party HTML/iframe creative at 300x250.

  URL PARAMETERS
  ──────────────
  campaign   Your campaign identifier        e.g. premier-league-2026
  publisher  The media owner / site name     e.g. sky-sports
  placement  Where on the page it appears    e.g. homepage-mpu
  country    2-letter ISO country code       Supplied by the ad server macro (see below)
  segment    Fan segment label               e.g. season-ticket-holder  (optional)

  COUNTRY — AD SERVER MACROS
  ──────────────────────────
  The ad server already knows the user's country via IP geolocation.
  Replace the country value with the correct macro for your ad server:

  Ad server              | Macro to use
  ───────────────────────|─────────────────────
  Google Ad Manager      | %%COUNTRY%%
  Xandr (AppNexus)       | ${GEO_COUNTRY}
  Freewheel              | [country]
  The Trade Desk         | ##COUNTRY##
  Pubmatic               | %%COUNTRY%%
  Smart AdServer         | [country]
  Amazon AAP             | ${USER_COUNTRY}
  DV360                  | %%COUNTRY%%

  The macro is automatically replaced with the 2-letter ISO code (e.g. GB, US, FR)
  at the moment the ad is served. No action needed from you.
-->


<!-- ═══════════════════════════════════════════════════════════ -->
<!-- GOOGLE AD MANAGER (DFP) — paste into creative HTML field   -->
<!-- ═══════════════════════════════════════════════════════════ -->
<iframe
  src="https://fanometrix-surveys.vercel.app/embed?campaign=YOUR_CAMPAIGN&publisher=YOUR_PUBLISHER&placement=YOUR_PLACEMENT&country=%%COUNTRY%%&segment=YOUR_SEGMENT"
  width="300"
  height="250"
  frameborder="0"
  scrolling="no"
  style="border:0; overflow:hidden; display:block;"
  title="Fanometrix Pulse Fan Survey"
  loading="lazy"
></iframe>


<!-- ═══════════════════════════════════════════════════════════ -->
<!-- XANDR (APPNEXUS)                                           -->
<!-- ═══════════════════════════════════════════════════════════ -->
<iframe
